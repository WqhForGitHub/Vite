<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>文件上传系统 - Vite Demo</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="container">
      <h1>文件上传系统</h1>
      <p class="subtitle">支持：拖拽上传 / 多文件 / 进度条 / 分片上传 / 秒传 / 暂停恢复</p>

      <!-- 拖拽区域 -->
      <div id="dropzone" class="dropzone">
        <div class="dropzone-inner">
          <svg
            viewBox="0 0 24 24"
            width="48"
            height="48"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="17 8 12 3 7 8" />
            <line x1="12" y1="3" x2="12" y2="15" />
          </svg>
          <p>点击或将文件拖拽到此处上传</p>
          <p class="hint">支持任意类型文件，单个最大 1GB</p>
        </div>
        <input type="file" id="file-input" multiple hidden />
      </div>

      <!-- 操作按钮 -->
      <div class="actions">
        <button id="btn-select">选择文件</button>
        <button id="btn-upload-all" class="primary">全部上传</button>
        <button id="btn-clear">清空列表</button>
      </div>

      <!-- 文件列表 -->
      <div class="file-list" id="file-list">
        <div class="empty">尚未选择任何文件</div>
      </div>
    </div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
