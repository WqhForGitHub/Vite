<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>低代码平台</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="lowcode">
      <aside class="left">
        <h3>组件库</h3>
        <div class="comp" draggable="true" data-type="text">文本</div>
        <div class="comp" draggable="true" data-type="button">按钮</div>
        <div class="comp" draggable="true" data-type="image">图片</div>
        <div class="comp" draggable="true" data-type="input">输入框</div>
      </aside>
      <main class="canvas" id="canvas">
        <p class="hint">拖拽左侧组件到此处</p>
      </main>
      <aside class="right">
        <h3>属性面板</h3>
        <div id="props"><p class="hint">请选择组件</p></div>
      </aside>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
