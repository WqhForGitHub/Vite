<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>图表系统</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header>
      <h2>📊 图表系统（ECharts）</h2>
    </header>
    <div class="grid">
      <div class="chart-card">
        <h3>折线图</h3>
        <div id="line" class="chart"></div>
      </div>
      <div class="chart-card">
        <h3>柱状图</h3>
        <div id="bar" class="chart"></div>
      </div>
      <div class="chart-card">
        <h3>饼图</h3>
        <div id="pie" class="chart"></div>
      </div>
      <div class="chart-card">
        <h3>雷达图</h3>
        <div id="radar" class="chart"></div>
      </div>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
